name: napari-afmslicer
display_name: AFMSlicer
# use 'hidden' to remove plugin from napari hub search results
visibility: public
# see https://napari.org/stable/plugins/technical_references/manifest.html#fields for valid categories
# categories: []
contributions:
  commands:
    - id: napari-afmslicer.get_reader
      python_name: napari_afmslicer._reader:napari_get_reader
      title: Open data with AFMSlicer
    - id: napari-afmslicer.write_multiple
      python_name: napari_afmslicer._writer:write_multiple
      title: Save multi-layer data with AFMSlicer
    - id: napari-afmslicer.write_single_image
      python_name: napari_afmslicer._writer:write_single_image
      title: Save image data with AFMSlicer
    - id: napari-afmslicer.make_sample_data
      python_name: napari_afmslicer._sample_data:make_sample_data
      title: Load sample data from AFMSlicer
    - id: napari-afmslicer.make_container_widget
      python_name: napari_afmslicer:ImageThreshold
      title: Make threshold Container widget
    - id: napari-afmslicer.make_magic_widget
      python_name: napari_afmslicer:threshold_magic_widget
      title: Make threshold magic widget
    - id: napari-afmslicer.make_function_widget
      python_name: napari_afmslicer:threshold_autogenerate_widget
      title: Make threshold function widget
    - id: napari-afmslicer.make_qwidget
      python_name: napari_afmslicer:ExampleQWidget
      title: Make example QWidget
  readers:
    - command: napari-afmslicer.get_reader
      accepts_directories: false
      filename_patterns: ['*.npy']
  writers:
    - command: napari-afmslicer.write_multiple
      layer_types: ['image*','labels*']
      filename_extensions: []
    - command: napari-afmslicer.write_single_image
      layer_types: ['image']
      filename_extensions: ['.npy']
  sample_data:
    - command: napari-afmslicer.make_sample_data
      display_name: AFMSlicer
      key: unique_id.1
  widgets:
    - command: napari-afmslicer.make_container_widget
      display_name: Container Threshold
    - command: napari-afmslicer.make_magic_widget
      display_name: Magic Threshold
    - command: napari-afmslicer.make_function_widget
      autogenerate: true
      display_name: Autogenerate Threshold
    - command: napari-afmslicer.make_qwidget
      display_name: Example QWidget
  menus:
    napari/layers/segment:
      - command: napari-afmslicer.make_container_widget
      - command: napari-afmslicer.make_magic_widget
      - command: napari-afmslicer.make_function_widget
      - command: napari-afmslicer.make_qwidget
